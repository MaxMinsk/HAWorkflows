name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/Workflow.Web/Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/Workflow.Web/Frontend
        run: npm ci

      - name: Frontend typecheck
        working-directory: src/Workflow.Web/Frontend
        run: npm run typecheck

      - name: Frontend build
        working-directory: src/Workflow.Web/Frontend
        run: npm run build

      - name: .NET build
        run: dotnet build WorkflowServer.sln --configuration Release
