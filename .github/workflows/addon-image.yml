name: Add-on Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths:
      - "addon/**"
      - "src/**"
      - "WorkflowServer.sln"
      - ".github/workflows/addon-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract add-on version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^version:[[:space:]]*"\(.*\)"$/\1/p' addon/config.yaml | head -n 1)"
          if [[ -z "${version}" ]]; then
            echo "Failed to read version from addon/config.yaml"
            exit 1
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "Detected version: ${version}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/Workflow.Web/Frontend/package-lock.json

      - name: Upgrade npm
        run: npm install -g npm@11.12.1

      - name: Install frontend dependencies
        working-directory: src/Workflow.Web/Frontend
        run: npm install --include=dev --no-audit --no-fund

      - name: Validate frontend toolchain
        working-directory: src/Workflow.Web/Frontend
        run: test -x node_modules/.bin/vite

      - name: Build frontend bundle
        working-directory: src/Workflow.Web/Frontend
        run: npm run build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: addon/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/base:3.23
            BUILD_VERSION=${{ steps.version.outputs.value }}
          tags: |
            ghcr.io/maxminsk/haworkflows:${{ steps.version.outputs.value }}
            ghcr.io/maxminsk/haworkflows:latest
